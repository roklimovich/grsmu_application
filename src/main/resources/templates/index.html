<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRSMU Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Папки с материалами для курсов</h1>
    <ul class="space-y-2">

        <form th:each="dir : ${directories}" th:action="@{/dir/{name}(name=${dir})}" method="get">
            <button type="submit"
                    class="px-3 py-2 rounded bg-green-500 hover:bg-green-600 text-white font-semibold">
                <span th:text="${dir}"></span>
            </button>
        </form>
    </ul>
</div>
</body>
</html>
