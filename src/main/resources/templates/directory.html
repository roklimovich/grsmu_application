<html lang="ru" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Содержимое: ' + ${directoryName}">Содержимое директории</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-4" th:text="'Содержимое директории: ' + ${directoryName}">Директория</h1>
    <ul class="space-y-2">
        <li th:each="file : ${files}">
            <span class="px-3 py-1 rounded bg-blue-100 hover:bg-blue-200 inline-block"
                  th:text="${file}"></span>
        </li>
    </ul>
</div>
</body>
</html>
